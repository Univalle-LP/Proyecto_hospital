services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hospital_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  db_citas:
    image: mysql:8.0
    container_name: hospital_db_citas
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citas_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  servicio_citas:
    build: ./servicio_citas
    container_name: hospital_api_citas
    ports:
      - "8000:8000"
    depends_on:
      db_citas:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: always

  servicio_notificaciones:
    build: ./servicio_notificaciones
    container_name: hospital_worker_notificaciones
    depends_on:
      - rabbitmq
    restart: always

  frontend:
    image: nginx:alpine
    container_name: hospital_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8080:80"
    restart: always