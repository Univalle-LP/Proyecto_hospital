<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario - HealthSync Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans flex justify-center items-center min-h-screen py-10">

    <section class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-700 mb-2">Registro de Usuario</h1>
            <p class="text-sm text-slate-500">Únete a la red de HealthSync Hospital</p>
        </div>

        <form id="registroForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Completo</label>
                <input id="regNombre" type="text" required placeholder="Ej. Juan Gabriel Rada Escobar" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de Usuario</label>
                    <input id="regUser" type="text" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                    <input id="regCorreo" type="email" required placeholder="correo@ejemplo.com" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input id="regPassword" type="password" required minlength="8" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-xs text-slate-400 mt-1">Debe tener al menos 8 caracteres.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar Contraseña</label>
                <input id="regConfirm" type="password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-bold hover:bg-emerald-700 transition shadow-lg mt-4">Crear Cuenta</button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-600 border-t pt-4">
            ¿Ya tienes una cuenta? <a href="inicio-sesion.html" class="text-blue-600 hover:underline font-semibold">Inicia Sesión</a>
        </div>
    </section>

    <script>
        const API_URL = "http://localhost:8000";

        document.getElementById('registroForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirm').value;

            if (pwd !== confirmPwd) {
                alert("Las contraseñas no coinciden. Por favor, verifica.");
                return;
            }

            const data = {
                nombre_completo: document.getElementById('regNombre').value,
                usuario: document.getElementById('regUser').value,
                correo: document.getElementById('regCorreo').value,
                password: pwd,
                rol: "paciente" // Por defecto, los registros externos son pacientes
            };

            try {
                const res = await fetch(`${API_URL}/registro`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    alert("¡Registro exitoso! Ya puedes iniciar sesión.");
                    window.location.href = 'inicio-sesion.html';
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.detail}`);
                }
            } catch(err) {
                alert("Error de conexión con el servidor.");
            }
        };
    </script>
</body>
</html>
