<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña · HealthSync</title>
    <!-- Tailwind + Font Awesome (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Estilos coherentes con la página de login -->
    <style>
        body {
            background: #000000; /* fondo negro puro */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        /* Tarjeta con estética neutra y elegante sobre fondo negro */
        .card-recuperar {
            background: #fcfcfd;
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            max-width: 440px;
        }
        .card-recuperar:hover {
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.7);
            transform: translateY(-2px);
        }

        /* Inputs con estilo neutro */
        .input-neutral {
            background: #f5f6f8;
            border: 1px solid #d5d8de;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            width: 100%;
            transition: all 0.2s;
            color: #2c313a;
            font-weight: 450;
            font-size: 0.95rem;
        }
        .input-neutral:focus {
            outline: none;
            border-color: #b0b8c4;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(176, 184, 196, 0.15);
        }
        .input-neutral::placeholder {
            color: #a8b2c0;
            font-weight: 350;
        }

        /* Botón primario neutro */
        .btn-primary {
            background: #2d3748;
            color: white;
            font-weight: 600;
            padding: 0.9rem;
            border-radius: 40px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(45, 55, 72, 0.2);
            letter-spacing: 0.3px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: #1a202c;
            box-shadow: 0 8px 20px rgba(45, 55, 72, 0.3);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Enlaces */
        .link-neutral {
            color: #5a6475;
            transition: color 0.15s;
            font-weight: 450;
            text-decoration: none;
        }
        .link-neutral:hover {
            color: #2c313a;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Icono de candado */
        .icon-circle {
            background: #eef0f3;
            color: #2d3748;
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
            transition: all 0.2s;
        }
        .icon-circle:hover {
            background: #e2e6ed;
            transform: scale(1.02);
        }

        /* Footer sutil */
        .footer-note {
            color: #9aa4b8;
            font-size: 0.7rem;
            letter-spacing: 0.3px;
        }

        /* separador */
        .divider-neutral {
            border: 0;
            border-top: 1px solid #e9ecf2;
            margin: 1.8rem 0 1rem;
        }

        /* etiquetas */
        .label-neutral {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3d4757;
            margin-bottom: 0.3rem;
            letter-spacing: 0.2px;
        }

        .brand-icon {
            color: #2d3748;
            opacity: 0.7;
        }
        .brand-title {
            color: #1a202c;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .brand-sub {
            color: #6b7689;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Copyright sobre fondo negro */
        .copyright {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.3px;
            text-align: center;
            margin-top: 2rem;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card-recuperar {
                border-radius: 1.5rem;
                padding: 1.8rem 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md px-4">
        <!-- Tarjeta principal -->
        <div class="card-recuperar p-8 md:p-10">

            <!-- encabezado -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-1">
                    <i class="fas fa-heartbeat text-2xl brand-icon"></i>
                    <span class="text-2xl font-bold brand-title">HealthSync</span>
                </div>
                <span class="text-sm font-medium brand-sub tracking-wide">Hospital · Sistema seguro</span>
                <div class="mt-4 h-0.5 w-12 mx-auto bg-slate-200 rounded-full"></div>
                
                <!-- Icono de recuperación -->
                <div class="icon-circle mt-4">
                    <i class="fas fa-unlock-alt"></i>
                </div>
                <h2 class="text-xl font-semibold text-slate-700 mt-2">Recuperar Contraseña</h2>
                <p class="text-sm text-slate-500 mt-1 max-w-xs mx-auto">
                    Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu acceso.
                </p>
            </div>

            <!-- formulario -->
            <form id="recuperarForm" class="space-y-5">

                <!-- correo -->
                <div>
                    <label for="recuperarCorreo" class="label-neutral">
                        <i class="far fa-envelope mr-1.5 text-slate-400"></i> Correo Electrónico
                    </label>
                    <input id="recuperarCorreo" type="email" required 
                           class="input-neutral" 
                           placeholder="correo@ejemplo.com" 
                           autocomplete="email">
                </div>

                <!-- botón de recuperación -->
                <button type="submit" id="btnRecuperar" class="btn-primary mt-2">
                    <i class="fas fa-paper-plane mr-2"></i> Enviar enlace de recuperación
                </button>
            </form>

            <!-- separador + volver -->
            <hr class="divider-neutral">
            <div class="text-center text-sm text-slate-500">
                <a href="inicio-sesion.html" class="font-semibold link-neutral">
                    <i class="fas fa-arrow-left mr-1"></i> Volver al inicio de sesión
                </a>
            </div>

            <!-- pequeño footer dentro de la tarjeta -->
            <div class="mt-6 text-center footer-note">
                <i class="fas fa-shield-alt mr-1"></i> Acceso seguro · autenticación con token
            </div>
        </div>

        <!-- copyright fuera de la tarjeta (sobre fondo negro) -->
        <div class="copyright">
            &copy; 2026 HealthSync Hospital · Sistema Seguro
        </div>
    </div>

    <!-- ====== JAVASCRIPT (MEJORADO CON ESTILO NEUTRO) ====== -->
    <script>
        document.getElementById('recuperarForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const correo = document.getElementById('recuperarCorreo').value;
            const boton = document.getElementById('btnRecuperar');

            if(correo) {
                // Efecto visual de carga
                const textoOriginal = boton.innerHTML;
                boton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Enviando correo...';
                boton.disabled = true;
                boton.classList.add("opacity-75");

                try {
                    const res = await fetch("http://localhost:8000/recuperar-password", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ correo: correo })
                    });

                    if(res.ok) {
                        alert(`¡Listo! Si el correo ${correo} está registrado, te hemos enviado un enlace para restablecer tu contraseña.`);
                        window.location.href = 'inicio-sesion.html';
                    } else {
                        const err = await res.json();
                        alert(`Error: ${err.detail || 'Hubo un problema de comunicación con el servidor.'}`);
                    }
                } catch(error) {
                    alert("Error crítico: No se pudo contactar al servidor de correos. Verifica que el microservicio esté encendido.");
                } finally {
                    // Restauramos el botón si algo falla
                    boton.innerHTML = textoOriginal;
                    boton.disabled = false;
                    boton.classList.remove("opacity-75");
                }
            }
        };
    </script>

</body>
</html>
