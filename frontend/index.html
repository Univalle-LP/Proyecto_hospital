<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>HealthSync Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-blue-700 p-4 text-white shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-bold">HealthSync Hospital</h1>
        <div id="userInfo" class="hidden flex items-center space-x-4">
            <span id="userNameDisplay" class="font-semibold"></span>
            <span id="userRoleBadge" class="bg-white text-blue-700 text-xs px-2 py-1 rounded-full uppercase font-bold"></span>
            <button onclick="cerrarSesion()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Salir</button>
        </div>
    </nav>

    <div id="loginScreen" class="flex justify-center items-center h-screen -mt-16">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-96">
            <h2 class="text-3xl mb-6 text-slate-800 font-bold text-center">Iniciar Sesión</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-600 mb-1">Usuario</label>
                    <input id="loginUsuario" type="text" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-1">Contraseña</label>
                    <input id="loginPassword" type="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">Ingresar</button>
            </form>
            <div class="mt-4 text-xs text-slate-500 bg-slate-100 p-3 rounded">
                <p><strong>Cuentas de acceso:</strong></p>
                <p>Admin: admin / admin123</p>
                <p>Médicos: dr_perez / 123 | dra_miranda / 123</p>
                <p>Paciente: juan / 123</p>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden container mx-auto p-4 mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div id="panelAgendar" class="hidden bg-white p-8 rounded-2xl shadow-xl h-fit">
                <h2 class="text-2xl font-semibold mb-6 text-slate-700">Solicitar Nueva Cita</h2>
                <form id="citaForm" class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-600 mb-1">Selecciona tu Médico Especialista</label>
                        <select id="doctor" onchange="actualizarFechasDisponibles()" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none bg-white" required>
                            <option value="" disabled selected>-- Elige un Profesional --</option>
                            <option value="Dr. Perez (Cirujano)">Dr. Perez (Cirujano)</option>
                            <option value="Dra. Miranda (Pediatra)">Dra. Miranda (Pediatra)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-1">Horarios de Atención Habilitados</label>
                        <select id="fechaSelect" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none bg-white" required>
                            <option value="" disabled selected>Primero selecciona un médico...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-1">Motivo de Consulta</label>
                        <textarea id="motivo" placeholder="Describe brevemente tus síntomas..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none h-24" required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">Confirmar Cupo Médico</button>
                </form>
            </div>

            <div id="panelDoctorHorarios" class="hidden bg-white p-8 rounded-2xl shadow-xl h-fit">
                <h2 class="text-2xl font-semibold mb-4 text-slate-700">Habilitar Mi Jornada</h2>
                <form id="horarioForm" class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm text-slate-600 mb-1">Abrir Nueva Hora de Atención</label>
                        <input id="nuevaFechaHora" type="datetime-local" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-bold hover:bg-emerald-700 transition">＋ Agregar Cupo</button>
                </form>
                <h3 class="font-semibold text-slate-700 mb-2 border-t pt-4">Historial de Mis Bloques Abiertos:</h3>
                <div id="listaMisHorarios" class="space-y-2 max-h-[250px] overflow-y-auto pr-1">
                    </div>
            </div>

            <div id="panelCitas" class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-xl">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 id="tituloBandeja" class="text-2xl font-semibold text-slate-700">Bandeja General</h2>
                    <button onclick="cargarCitas()" class="text-blue-600 font-semibold hover:underline">↻ Actualizar</button>
                </div>
                <div id="listaCitas" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        let usuarioActual = null;

        // --- LÓGICA DE LOGIN ---
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const usr = document.getElementById('loginUsuario').value;
            const pwd = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({usuario: usr, password: pwd})
                });

                if(res.ok) {
                    const data = await res.json();
                    usuarioActual = data.usuario;
                    configurarInterfaz();
                } else {
                    alert("Credenciales inválidas.");
                }
            } catch(err) {
                alert("Error de infraestructura.");
            }
        };

        // --- ADAPTACIÓN ESTRUCTURAL DE ROLES ---
        function configurarInterfaz() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('hidden');
            
            document.getElementById('userNameDisplay').innerText = usuarioActual.nombre_completo;
            document.getElementById('userRoleBadge').innerText = usuarioActual.rol;

            const panelAgendar = document.getElementById('panelAgendar');
            const panelDoctorHorarios = document.getElementById('panelDoctorHorarios');
            const panelCitas = document.getElementById('panelCitas');
            const tituloBandeja = document.getElementById('tituloBandeja');

            if(usuarioActual.rol === 'paciente') {
                panelAgendar.classList.remove('hidden');
                panelDoctorHorarios.classList.add('hidden');
                panelCitas.classList.replace('lg:col-span-3', 'lg:col-span-2');
                tituloBandeja.innerText = "Mis Citas Agendadas";
            } else if(usuarioActual.rol === 'doctor') {
                panelAgendar.classList.add('hidden');
                panelDoctorHorarios.classList.remove('hidden');
                panelCitas.classList.replace('lg:col-span-3', 'lg:col-span-2');
                tituloBandeja.innerText = `Consultas Clínicas Asignadas`;
                cargarHorariosDoctor();
            } else if(usuarioActual.rol === 'admin') {
                panelAgendar.classList.add('hidden');
                panelDoctorHorarios.classList.add('hidden');
                panelCitas.classList.replace('lg:col-span-2', 'lg:col-span-3'); // Ocupa espacio extendido
                tituloBandeja.innerText = "Panel de Auditoría General (Todos los Doctores y Citas)";
            }

            cargarCitas();
        }

        function cerrarSesion() {
            usuarioActual = null;
            document.getElementById('loginForm').reset();
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appContent').classList.add('hidden');
            document.getElementById('userInfo').classList.add('hidden');
        }

        // --- LOGICA FILTRADA DE DISPONIBILIDADES (Paciente) ---
        async function actualizarFechasDisponibles() {
            const doctorSeleccionado = document.getElementById('doctor').value;
            const fechaSelect = document.getElementById('fechaSelect');
            fechaSelect.innerHTML = '<option value="" disabled selected>Buscando agenda disponible...</option>';

            try {
                const res = await fetch(`${API_URL}/horarios`);
                const data = await res.json();
                
                // Filtramos que correspondan al doctor elegido y estén sin reservar
                const disponibles = data.horarios.filter(h => h.doctor === doctorSeleccionado && h.estado === 'Disponible');

                if(disponibles.length > 0) {
                    fechaSelect.innerHTML = '<option value="" disabled selected>-- Elige un Horario --</option>' +
                        disponibles.map(h => `<option value="${h.fecha_hora}" data-id="${h.id}">${h.fecha_hora.replace('T', ' ')}</option>`).join('');
                } else {
                    fechaSelect.innerHTML = '<option value="" disabled selected>❌ El doctor no tiene horarios abiertos</option>';
                }
            } catch {
                fechaSelect.innerHTML = '<option value="" disabled selected>Error consultando agenda.</option>';
            }
        }

        // --- CREACIÓN DE HORARIOS (Doctor) ---
        document.getElementById('horarioForm').onsubmit = async (e) => {
            e.preventDefault();
            const nuevoCupo = {
                doctor: usuarioActual.nombre_completo,
                fecha_hora: document.getElementById('nuevaFechaHora').value
            };

            const res = await fetch(`${API_URL}/horarios`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(nuevoCupo)
            });

            if(res.ok) {
                alert("¡Bloque de tiempo añadido a tu agenda pública!");
                document.getElementById('nuevaFechaHora').value = '';
                cargarHorariosDoctor();
            }
        };

        async function cargarHorariosDoctor() {
            const res = await fetch(`${API_URL}/horarios`);
            const data = await res.json();
            const lista = document.getElementById('listaMisHorarios');
            const misHorarios = data.horarios.filter(h => h.doctor === usuarioActual.nombre_completo);

            if(misHorarios.length > 0) {
                lista.innerHTML = misHorarios.map(h => `
                    <div class="flex justify-between items-center p-2 bg-slate-50 border border-slate-200 rounded text-xs">
                        <span class="font-medium text-slate-700">📅 ${h.fecha_hora.replace('T', ' ')}</span>
                        <span class="px-2 py-0.5 rounded-full font-bold ${h.estado === 'Disponible' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${h.estado}</span>
                    </div>
                `).join('');
            } else {
                lista.innerHTML = '<p class="text-xs text-slate-400 italic text-center p-2">No has abierto turnos aún.</p>';
            }
        }

        // --- OBTENER Y FILTRAR CONTROL DE CITAS ---
        async function cargarCitas() {
            const res = await fetch(`${API_URL}/citas`);
            const data = await res.json();
            const lista = document.getElementById('listaCitas');
            
            let citasFiltradas = data.citas;

            if(usuarioActual.rol === 'paciente') {
                citasFiltradas = data.citas.filter(c => c.paciente === usuarioActual.nombre_completo);
            } else if (usuarioActual.rol === 'doctor') {
                citasFiltradas = data.citas.filter(c => c.doctor === usuarioActual.nombre_completo);
            }

            if (citasFiltradas.length > 0) {
                lista.innerHTML = citasFiltradas.map(c => {
                    // Colores por estado
                    let colorBorde = 'border-amber-500';
                    let colorFondo = 'bg-slate-50';
                    let colorEtiqueta = 'bg-amber-100 text-amber-700';
                    
                    if (c.estado === 'Validada') { colorBorde = 'border-blue-500'; colorFondo = 'bg-blue-50/30'; colorEtiqueta = 'bg-blue-100 text-blue-700'; }
                    if (c.estado === 'Realizada') { colorBorde = 'border-green-500'; colorFondo = 'bg-green-50/50'; colorEtiqueta = 'bg-green-100 text-green-700'; }
                    if (c.estado === 'Cancelada') { colorBorde = 'border-red-500'; colorFondo = 'bg-red-50/50'; colorEtiqueta = 'bg-red-100 text-red-700'; }

                    // Lógica de botones según Rol y Estado
                    let botonesAccion = '';
                    if (usuarioActual.rol === 'admin' && c.estado === 'Pendiente') {
                        botonesAccion = `<button onclick="cambiarEstadoCita(${c.id}, 'Validada')" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow font-bold text-sm transition">✔ Aprobar Cita</button>`;
                    } else if (usuarioActual.rol === 'doctor' && c.estado === 'Validada') {
                        botonesAccion = `
                            <div class="flex space-x-2 mt-2 md:mt-0">
                                <button onclick="cambiarEstadoCita(${c.id}, 'Realizada')" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow font-bold text-sm transition">✔ Realizada</button>
                                <button onclick="cambiarEstadoCita(${c.id}, 'Cancelada')" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded shadow font-bold text-sm transition">❌ Cancelar</button>
                            </div>
                        `;
                    }

                    return `
                    <div class="p-5 border-l-4 ${colorBorde} ${colorFondo} flex flex-col md:flex-row justify-between items-start md:items-center rounded shadow-sm">
                        <div>
                            <p class="font-bold text-slate-800 text-lg">${c.paciente}</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-1 mt-1 text-sm text-slate-600">
                                <p> 🩺 <span class="font-medium text-slate-700">Médico:</span> ${c.doctor}</p>
                                <p> 📅 <span class="font-medium text-slate-700">Horario:</span> ${c.fecha.replace('T', ' ')}</p>
                            </div>
                            <p class="text-xs mt-2 text-slate-500 italic bg-white p-2 rounded border border-slate-100">"${c.motivo}"</p>
                        </div>
                        <div class="flex flex-col items-end justify-center w-full md:w-auto border-t md:border-0 pt-2 md:pt-0 mt-2 md:mt-0">
                            <span class="px-3 py-1 rounded-full text-xs font-bold mb-2 ${colorEtiqueta}">${c.estado}</span>
                            ${botonesAccion}
                        </div>
                    </div>
                `}).join('');
            } else {
                lista.innerHTML = '<p class="text-slate-400 italic text-center p-12 bg-slate-50 rounded-xl border border-dashed">No se registran citas médicas en esta bandeja.</p>';
            }
        }

        // --- ENVIAR CITA CONSUMIENDO EL SELECT ---
        document.getElementById('citaForm').onsubmit = async (e) => {
            e.preventDefault();
            const fechaSelect = document.getElementById('fechaSelect');
            const opcionElegida = fechaSelect.options[fechaSelect.selectedIndex];
            const hId = opcionElegida.getAttribute('data-id');

            const cita = {
                paciente: usuarioActual.nombre_completo,
                doctor: document.getElementById('doctor').value,
                fecha: fechaSelect.value,
                motivo: document.getElementById('motivo').value,
                horario_id: parseInt(hId)
            };
            
            const res = await fetch(`${API_URL}/agendar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(cita)
            });
            
            if(res.ok) { 
                alert("¡Cita reservada con éxito!"); 
                cargarCitas(); 
                e.target.reset();
                document.getElementById('fechaSelect').innerHTML = '<option value="" disabled selected>Primero selecciona un médico...</option>';
            }
        };

        // --- CAMBIAR ESTADO DE LA CITA ---
        async function cambiarEstadoCita(id, nuevoEstado) {
            if(confirm(`¿Estás seguro de marcar esta cita como ${nuevoEstado}? El paciente será notificado.`)) {
                await fetch(`${API_URL}/citas/${id}/estado`, { 
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                cargarCitas();
            }
        }
    </script>
</body>
</html>
